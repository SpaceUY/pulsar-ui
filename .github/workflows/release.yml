name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    environment: library-release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn prepare

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # npm Trusted Publishing (OIDC) requires npm >= 11.5.1 and Node >= 22.14.0,
      # newer than the .nvmrc pin used for the build above. Float to the latest
      # 22.x patch rather than pinning one, since npm@latest's own engine
      # requirement creeps forward over time.
      #
      # Deliberately omit registry-url: passing it makes setup-node write a
      # placeholder NODE_AUTH_TOKEN/.npmrc auth token, which makes npm use
      # classic token auth instead of the OIDC trusted-publishing exchange
      # (causing a 404 on publish). package.json's publishConfig already
      # points npm at the right registry with public access.
      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Update npm
        run: npm install -g npm@latest

      # Version bumping is expected to already be done in package.json before
      # this workflow runs (currently done manually; the release-pr skill will
      # take over computing and committing it). --no-increment tells release-it
      # to publish whatever version is already there instead of recomputing one.
      - name: Release
        run: yarn release --ci --no-increment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
